name: workout_tracker
description: Gestión de rutina de gimnasio con seguimiento de progreso y cardio.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.5.1

  # Persistencia local
  sqflite: ^2.3.3+1
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Gráficos
  fl_chart: ^0.69.0

  # Notificaciones locales
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Permisos (notificaciones en iOS/Android)
  permission_handler: ^11.3.1

  # Mantener pantalla encendida durante el entrenamiento
  wakelock_plus: ^1.2.8

  # Internacionalización y formato de fechas
  intl: ^0.19.0

  # UUID para IDs temporales en sesión activa
  uuid: ^4.5.1

  # Exportar CSV
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.13
  sqflite_common_ffi: ^2.3.4+1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
